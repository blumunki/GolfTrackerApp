<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Golf Tracker</title>
    <base href="/" />
    
    <!-- Load MudBlazor CSS -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- Mobile-specific overrides can go here if needed -->
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/mobile.css" rel="stylesheet" />
    <link href="GolfTrackerApp.Mobile.styles.css" rel="stylesheet" />
</head>

<body>

    <div id="app">
        <div style="position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background: linear-gradient(135deg, #1a3a1f 0%, #2c5530 50%, #3d7a44 100%);">
            <!-- Golf flag icon -->
            <svg width="80" height="80" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 24px;">
                <line x1="200" y1="60" x2="200" y2="280" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
                <path d="M 204 60 L 280 88 L 204 116 Z" fill="#e74c3c"/>
                <ellipse cx="200" cy="286" rx="36" ry="11" fill="rgba(255,255,255,0.15)"/>
                <circle cx="256" cy="272" r="20" fill="#ffffff"/>
                <circle cx="250" cy="266" r="2" fill="#ddd" opacity="0.6"/>
                <circle cx="262" cy="266" r="2" fill="#ddd" opacity="0.6"/>
                <circle cx="256" cy="260" r="2" fill="#ddd" opacity="0.6"/>
            </svg>
            <p style="color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; margin: 0 0 8px 0;">GOLF TRACKER</p>
            <p style="color: rgba(255,255,255,0.6); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; letter-spacing: 3px; margin: 0 0 32px 0;">TRACK YOUR GAME</p>
            <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- This is the only Blazor script needed for MAUI Blazor Hybrid -->
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

</body>

</html>
