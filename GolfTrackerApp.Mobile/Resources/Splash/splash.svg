<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Golf flag pole -->
    <line x1="200" y1="60" x2="200" y2="280" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M 204 60 L 280 88 L 204 116 Z" fill="#e74c3c"/>
    <!-- Golf hole -->
    <ellipse cx="200" cy="286" rx="36" ry="11" fill="#1a3a1f"/>
    <!-- Golf ball -->
    <circle cx="256" cy="272" r="20" fill="#ffffff"/>
    <!-- Ball dimples -->
    <circle cx="250" cy="266" r="2" fill="#ddd" opacity="0.6"/>
    <circle cx="262" cy="266" r="2" fill="#ddd" opacity="0.6"/>
    <circle cx="256" cy="260" r="2" fill="#ddd" opacity="0.6"/>
    <circle cx="244" cy="274" r="2" fill="#ddd" opacity="0.6"/>
    <circle cx="256" cy="278" r="2" fill="#ddd" opacity="0.6"/>
    <circle cx="268" cy="274" r="2" fill="#ddd" opacity="0.6"/>
    <!-- "Golf Tracker" text -->
    <text x="228" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="2">GOLF TRACKER</text>
    <!-- Decorative line -->
    <line x1="128" y1="360" x2="328" y2="360" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <!-- Subtitle -->
    <text x="228" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" opacity="0.7" letter-spacing="4">TRACK YOUR GAME</text>
</svg>